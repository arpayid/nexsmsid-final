# Cursor Cloud / nested-DinD override for docker-compose.prod.yml
#
# The Cloud Agent VM exposes a cgroup-v2 hierarchy that is entirely a "threaded"
# subtree and does NOT delegate the memory/io controllers. As a result, Docker
# cannot apply per-container CPU/memory cgroup limits (runc fails with
# 'cannot enter cgroupv2 ... it is in threaded mode'). Containers run fine
# without resource limits, so this override zeroes out every service's
# deploy.resources (compose drops 0-valued limits) to let the full prod stack
# boot in the cloud environment.
#
# Usage:
#   docker compose --env-file .env.production \
#     -f docker-compose.prod.yml -f docker-compose.cloud.yml up -d
#
# This file is ONLY for the constrained cloud VM. Real production servers should
# use docker-compose.prod.yml on its own so the resource limits take effect.

services:
  postgres:
    deploy:
      resources:
        limits: { cpus: "0", memory: "0" }
        reservations: { memory: "0" }

  redis:
    deploy:
      resources:
        limits: { cpus: "0", memory: "0" }
        reservations: { memory: "0" }

  api:
    deploy:
      resources:
        limits: { cpus: "0", memory: "0" }
        reservations: { memory: "0" }

  web:
    deploy:
      resources:
        limits: { cpus: "0", memory: "0" }
        reservations: { memory: "0" }

  nginx:
    deploy:
      resources:
        limits: { cpus: "0", memory: "0" }
        reservations: { memory: "0" }

  backup:
    deploy:
      resources:
        limits: { cpus: "0", memory: "0" }
        reservations: { memory: "0" }
