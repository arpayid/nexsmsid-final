# Upstream targets referenced by default.conf / https.conf.
# default.conf and https.conf.example proxy_pass to api_upstream / web_upstream,
# so these blocks must exist for nginx to start. scripts/setup-scaling.sh
# regenerates this file with load-balancing tweaks when scaling horizontally.
upstream api_upstream {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
}

upstream web_upstream {
    server web:3000;
}
