# Upstreams — resolved via Docker DNS for services `api` and `web`.
# least_conn + max_fails make `docker compose up --scale api=N` work out of the box.
upstream api_upstream {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
}

upstream web_upstream {
    least_conn;
    server web:3000 max_fails=3 fail_timeout=30s;
}
