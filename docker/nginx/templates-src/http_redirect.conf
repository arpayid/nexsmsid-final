# HTTPS mode (DOMAIN set) — port 80 redirects everything to HTTPS.
# Exceptions: ACME http-01 challenge (certbot) and /health (container healthcheck).
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        proxy_pass http://api_upstream/api/v1/health;
        include /etc/nginx/snippets/proxy_headers.conf;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
