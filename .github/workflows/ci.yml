name: NexSMSID V4 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-validation:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: test
      # Use port 5433 to avoid conflicts with any host-level PostgreSQL
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://nexsmsid:nexsmsid@localhost:5433/nexsmsid_test' }}
      # Empty shadow DB used by `prisma migrate diff --to-migrations` (created by ci-services.sh).
      SHADOW_DATABASE_URL: ${{ secrets.CI_SHADOW_DATABASE_URL || 'postgresql://nexsmsid:nexsmsid@localhost:5433/nexsmsid_shadow' }}
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      # Fall back to CI-only test secrets so the suite is self-contained when repo
      # secrets are unset (NODE_ENV=test requires >= 32 chars; these are not real secrets).
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'ci-access-secret-0123456789abcdef0123456789abcdef0123456789abcdef' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-fedcba9876543210fedcba9876543210fedcba98765432' }}
      WEB_ORIGIN: http://localhost:3000
      API_PORT: 4000
      API_PREFIX: api/v1
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_LIMIT: 100
      STORAGE_PATH: /tmp/nexsmsid-final/storage
      REPORT_STORAGE_PATH: /tmp/nexsmsid-final/storage/reports
      LOG_LEVEL: error
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      PPDB_LEGACY_PIN_GRACE_END: 2026-07-15T00:00:00.000Z
      CI_COMPOSE_PROJECT: nexsmsid-final-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure PostgreSQL and Redis (isolated CI ports)
        run: |
          chmod +x ./scripts/ci-services.sh
          # Always tear down old containers and volumes to guarantee clean state
          CI_KEEP_SERVICES=0 CI_RESET_VOLUMES=1 \
            POSTGRES_PORT=5433 REDIS_PORT=6380 \
            ./scripts/ci-services.sh stop || true
          POSTGRES_PORT=5433 REDIS_PORT=6380 \
            ./scripts/ci-services.sh start

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and Install pnpm
        run: corepack enable pnpm

      - name: Prepare cache directories
        run: |
          mkdir -p "$HOME/.cache/turbo"
          echo "TURBO_CACHE_DIR=$HOME/.cache/turbo" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate Prisma client
        run: pnpm --filter @nexsmsid/api prisma generate

      - name: Validate Prisma schema & migrations
        run: |
          pnpm --filter @nexsmsid/api prisma validate
          # Ensure no unapplied migrations (must match deploy order)
          pnpm --filter @nexsmsid/api prisma migrate diff \
            --from-schema-datamodel prisma/schema.prisma \
            --to-migrations prisma/migrations/ \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code || {
            echo "❌ Migration drift detected. Run 'pnpm --filter @nexsmsid/api prisma migrate dev' locally."
            exit 1
          }

      - name: Static checks and API unit tests
        run: |
          set -e
          pnpm format:check &
          pid_format=$!
          pnpm lint &
          pid_lint=$!
          pnpm --filter @nexsmsid/api test -- --coverage &
          pid_test=$!
          wait "$pid_format"
          wait "$pid_lint"
          wait "$pid_test"

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Integration Tests (real PostgreSQL + Redis)
        run: |
          # Push schema and seed data for integration tests
          pnpm --filter @nexsmsid/api prisma db push --accept-data-loss
          pnpm --filter @nexsmsid/api prisma db seed || echo "Seed failed (non-fatal)"
          pnpm --filter @nexsmsid/api test:integration

      - name: Audit Dependencies (high severity only)
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Stop PostgreSQL and Redis
        if: always()
        run: |
          POSTGRES_PORT=5433 REDIS_PORT=6380 \
            ./scripts/ci-services.sh stop
